apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ztd-capstone-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Infrathrone-Devops-Park/ztd-capstone
    targetRevision: main
    path: deploy/helm/ztd-capstone
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false

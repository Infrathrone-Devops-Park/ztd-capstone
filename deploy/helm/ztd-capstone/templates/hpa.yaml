{{- range $svcName, $svc := .Values.services }}
{{- if $svc.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "ztd.svcFullname" (dict "root" $ "service" $svcName) }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "ztd.serviceLabels" (dict "root" $ "service" $svcName) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "ztd.svcFullname" (dict "root" $ "service" $svcName) }}
  minReplicas: {{ $svc.hpa.minReplicas }}
  maxReplicas: {{ $svc.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $svc.hpa.targetCPU }}
---
{{- end }}
{{- end }}

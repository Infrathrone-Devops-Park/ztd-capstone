# Monorepo aggregation: one SonarQube project (ztd-capstone) covering all
# four services. Project key/name match the project created via
# api/projects/create against http://13.200.32.13:9000 (Phase 7 Task 3).
sonar.projectKey=ztd-capstone
sonar.projectName=ztd-capstone

sonar.sources=services/frontend/src,services/api-gateway/src,services/catalog,services/orders/app
sonar.tests=services/frontend/src,services/api-gateway/test,services/catalog,services/orders/tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*_test.go,**/test_*.py

sonar.exclusions=**/node_modules/**,**/dist/**,**/.venv/**,**/*.egg-info/**,**/__pycache__/**,**/*.tsbuildinfo

sonar.sourceEncoding=UTF-8

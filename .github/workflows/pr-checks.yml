name: pr-checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      orders: ${{ steps.filter.outputs.orders }}
      catalog: ${{ steps.filter.outputs.catalog }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'services/frontend/**'
            api-gateway:
              - 'services/api-gateway/**'
            orders:
              - 'services/orders/**'
            catalog:
              - 'services/catalog/**'

  test-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  test-api-gateway:
    needs: changes
    if: needs.changes.outputs.api-gateway == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/api-gateway/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  test-catalog:
    needs: changes
    if: needs.changes.outputs.catalog == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/catalog
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: services/catalog/go.sum
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./... -v

  test-orders:
    needs: changes
    if: needs.changes.outputs.orders == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/orders
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -q

  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube quality-gate scan
        uses: sonarsource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=ztd-capstone
            -Dsonar.qualitygate.wait=true

  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      # GATE: table format (not sarif). The trivy-action's sarif mode emits an
      # all-severity report and gates on it regardless of `severity`, so it
      # false-fails on MEDIUM/LOW; table mode passes `--severity HIGH,CRITICAL
      # --exit-code 1 --ignorefile` straight to trivy and fails only on a
      # non-ignored HIGH/CRITICAL. This is the real, active security gate.
      - name: Trivy fs + config scan (blocking on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: 'false'
          trivyignores: .trivyignore
          format: table

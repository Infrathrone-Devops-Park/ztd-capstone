name: ci

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        service: [frontend, api-gateway, orders, catalog]
    steps:
      - uses: actions/checkout@v4

      - id: tag
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC, no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # ECR repos are image_tag_mutability=IMMUTABLE, so re-running this
      # workflow for the same commit (e.g. a rerun after only the deploy job
      # failed) must not re-push an already-published tag.
      - name: Check whether this tag is already pushed
        id: exists
        run: |
          if aws ecr describe-images \
              --repository-name "ztd-capstone/${{ matrix.service }}" \
              --image-ids imageTag="${{ steps.tag.outputs.tag }}" \
              --region "${{ vars.AWS_REGION }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        if: steps.exists.outputs.exists != 'true'
        run: docker build -t "local/${{ matrix.service }}:scan" "services/${{ matrix.service }}"

      # GATE: table format (not sarif). The trivy-action's sarif mode emits an
      # all-severity report and gates on it regardless of `severity`, so it
      # false-fails on MEDIUM/LOW; table mode passes `--severity HIGH,CRITICAL
      # --exit-code 1 --ignorefile` straight to trivy and fails only on a
      # non-ignored HIGH/CRITICAL. This is the real, active security gate.
      - name: Trivy image scan (blocking on HIGH/CRITICAL)
        if: steps.exists.outputs.exists != 'true'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: local/${{ matrix.service }}:scan
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: 'false'
          trivyignores: .trivyignore
          format: table

      - name: Login to ECR
        if: steps.exists.outputs.exists != 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag + push to ECR
        if: steps.exists.outputs.exists != 'true'
        run: |
          image="${{ vars.ECR_REGISTRY }}/ztd-capstone/${{ matrix.service }}:${{ steps.tag.outputs.tag }}"
          docker tag "local/${{ matrix.service }}:scan" "$image"
          docker push "$image"

      - name: Install cosign
        if: steps.exists.outputs.exists != 'true'
        uses: sigstore/cosign-installer@v3

      - name: Generate SBOM (SPDX)
        if: steps.exists.outputs.exists != 'true'
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD":/out aquasec/trivy:latest image \
            --format spdx-json -o /out/sbom-${{ matrix.service }}.spdx.json \
            "local/${{ matrix.service }}:scan"

      - name: Cosign keyless sign + attest SBOM
        if: steps.exists.outputs.exists != 'true'
        env:
          COSIGN_YES: 'true'
        run: |
          image="${{ vars.ECR_REGISTRY }}/ztd-capstone/${{ matrix.service }}:${{ steps.tag.outputs.tag }}"
          digest="$(docker inspect --format='{{index .RepoDigests 0}}' "$image")"
          cosign sign --yes "$digest"
          cosign attest --yes --predicate "sbom-${{ matrix.service }}.spdx.json" --type spdxjson "$digest"

  # GitOps deploy (Phase 8): CI no longer touches the cluster at all — it
  # just bumps image.tag in git and ArgoCD (automated sync + selfHeal on the
  # dev Application) rolls it out from there. Only needs `contents: write`
  # to commit the bump; no AWS/EKS credentials required for this job.
  bump-image-tag:
    needs: build-scan-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - id: tag
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Bump image.tag in values-dev.yaml
        run: |
          sed -i '0,/^  tag:/{s/^  tag:.*/  tag: ${{ steps.tag.outputs.tag }}/}' \
            deploy/helm/ztd-capstone/values-dev.yaml
          grep -n "tag:" deploy/helm/ztd-capstone/values-dev.yaml | head -1

      # [skip ci] on the commit message stops GitHub from triggering this
      # workflow again for the bump commit itself (avoids a build loop).
      - name: Commit + push (ArgoCD dev Application auto-syncs from this)
        run: |
          git config user.name "SaiPisey2"
          git config user.email "piseysai0202@gmail.com"
          git add deploy/helm/ztd-capstone/values-dev.yaml
          if git diff --cached --quiet; then
            echo "No image.tag change to commit (tag already at ${{ steps.tag.outputs.tag }})"
            exit 0
          fi
          git commit -m "chore(dev): bump image.tag to ${{ steps.tag.outputs.tag }} [skip ci]"
          git push origin HEAD:main
